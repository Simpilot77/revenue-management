name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  # Auch nach einem Lodgify-Sync neu deployen
  workflow_run:
    workflows: ["Lodgify Sync"]
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Abhängigkeiten installieren
        run: pip install requests -q

      - name: Lodgify sync ausführen (sync.json befüllen)
        env:
          LODGIFY_API_KEY:    ${{ secrets.LODGIFY_API_KEY }}
          LODGIFY_ACCOUNT_ID: ${{ secrets.LODGIFY_ACCOUNT_ID }}
          HOUSE_MAP:          ${{ secrets.LODGIFY_HOUSE_MAP }}
        run: python .github/scripts/lodgify_sync.py

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
